<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Formulário para Adoção de Cães</h1>
    </header>

    <main>
        <div class="formu">
            <form id="formu">

                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome">
                <hr>

                <label for="email">Email:</label>
                <input type="text" id="email">
                <hr>

                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone">
                <hr>

                <label for="cpf">CPF:</label>
                <input type="text" id="cpf">
                <hr>

                <label for="idade">Idade:</label>
                <input type="number" id="idade">
                <hr>

                <label for="cidade">Cidade:</label>
                <input type="text" id="cidade">
                <hr>

                <label for="moradia">Tipo de Moradia:</label>
                <select id="moradia">
                    <option value="casa">Casa</option>
                    <option value="apartamento">Apartamento</option>
                </select>
                <hr>

                <label for="quintal">Possui quintal?</label>
                <select id="quintal">
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
                <hr>

                <div id="temquintal" style="display: none;">
                    <label for="seguroquintal">O quintal é seguro?</label>
                    <select id="seguroquintal">
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                    <hr>
                </div>

                <div id="podepet" style="display: none;">
                    <label for="permitepet">O local permite animais?</label>
                    <select id="permitepet">
                        <option value="sim">Sim</option>
                        <option value="nao">Não</option>
                    </select>
                    <hr>
                </div>

                <label for="peta">Já teve pet antes?</label>
                <select id="peta">
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
                <hr>

                <label for="sozinho">Quantas horas o animal ficará sozinho por dia?</label>
                <input type="number" id="sozinho">
                <hr>

                <div id="mophoras" style="display: none;">
                    <label for="justhorasso">Justifique caso fique mais de 8 horas sozinho:</label>
                    <textarea id="justhorasso"></textarea>
                    <hr>
                </div>

                <label for="motivo">Motivo da adoção:</label>
                <textarea id="motivo"></textarea>
                <hr>

                <label for="financeiro">Você tem condições financeiras para manter o animal?</label>
                <select id="financeiro">
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
                <hr>

                <label for="decisaohj">Você decidiu adotar hoje?</label>
                <select id="decisaohj"></select>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
                <hr>

                <label for="espacoexterno">Pretende usar espaço externo para o animal?</label>
                <select id="espacoexterno">
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select>
                <hr>

                <div class="termo">
                    <label for="termo">Aceite o termo de responsabilidade:</label>
                    <input type="checkbox" id="termo">
                </div>
                <hr>

                <button type="submit">Enviar</button>

            </form>

            <div id="msgerro"></div>
            <div id="resultado"></div>
        </div>
    </main>

    <footer>
        Todos os direitos reservados a AmeUmPet
    </footer>

    <script src="script.js"></script>
</body>

</html>
